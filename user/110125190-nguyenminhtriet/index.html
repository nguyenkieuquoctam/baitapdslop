<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thông tin cá nhân</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

/* Layout */
.container {
    display: flex;
    align-items: center;
    gap: 20px;
}

/* Ảnh */
.container img {
    width: 150px;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
}

/* Thông tin */
.info h2 {
    margin: 0 0 10px 0;
}

.info p {
    margin: 5px 0;
}
</style>

</head>

<body>

<div class="container">

    <!-- Ảnh -->
    <img src="assets/triet.jpg">

    <!-- Thông tin -->
    <div class="info">
        <h2>Nguyễn Minh Triết</h2>
        <p><b>MSSV:</b> 110125190</p>
        <p><b>Sở thích:</b> Viết code, chơi game</p>
        <p><b>Hoạt động:</b> CLB IT</p>
    </div>

</div>

</body>
</html>
